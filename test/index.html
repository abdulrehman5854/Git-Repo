<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ Simple Site</h1>
            <p class="tagline">Clean. Minimal. Modern.</p>
        </header>

        <main>
            <section class="hero">
                <h2>Hello, World!</h2>
                <p>This is a short and simple website built with separate HTML and CSS files. Lightweight, responsive, and easy to customize.</p>
                <button class="btn" id="clickBtn">Click Me</button>
            </section>

            <section class="features">
                <div class="feature">
                    <h3>📱 Responsive</h3>
                    <p>Works on all devices</p>
                </div>
                <div class="feature">
                    <h3>⚡ Fast</h3>
                    <p>Pure HTML & CSS</p>
                </div>
                <div class="feature">
                    <h3>🎨 Simple</h3>
                    <p>Easy to edit</p>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2025 Simple Website</p>
        </footer>
    </div>

    <script>
        document.getElementById('clickBtn').addEventListener('click', function() {
            alert('Hello! Thanks for clicking 🎉');
        });
    </script>
</body>
</html>
